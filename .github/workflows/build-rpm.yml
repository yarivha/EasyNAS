name: Build RPMs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rpmbuild
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            RELEASE="1"
            CHANNEL="stable"
          else
            VERSION=$(grep "^Version:" easynas.spec | awk '{print $2}')
            RELEASE="0.testing.$(date +%Y%m%d%H%M%S)"
            CHANNEL="testing"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Update spec version
        run: |
          sed -i "s/^Version:.*/Version:        ${{ steps.version.outputs.version }}/" easynas.spec
          sed -i "0,/^Release:.*/s/^Release:.*/Release:        ${{ steps.version.outputs.release }}/" easynas.spec

      - name: Create source tarball
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,RPMS,BUILD,SRPMS}
          tar czf ~/rpmbuild/SOURCES/easynas-${VERSION}.tar.gz \
            --transform "s,^\.,easynas-${VERSION}," \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='easynas.spec' \
            -C $GITHUB_WORKSPACE .

      - name: Build RPMs
        run: rpmbuild -bb easynas.spec

      - name: Collect RPMs
        run: |
          mkdir -p rpms
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp {} rpms/ \;
          ls -la rpms/

      - uses: actions/upload-artifact@v4
        with:
          name: easynas-rpms-${{ steps.version.outputs.channel }}
          path: rpms/*.rpm

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: easynas-rpms-stable
          path: rpms

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "EasyNAS ${GITHUB_REF_NAME}" \
            --generate-notes \
            rpms/*.rpm
